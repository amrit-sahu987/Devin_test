
services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  ngrok:
    image: ngrok/ngrok:latest
    command: ["http", "orchestrator:8000"]
    ports:
      - "4040:4040" 
    env_file:
      - .env
    depends_on:
      - orchestrator